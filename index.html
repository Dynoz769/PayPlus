<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayar dengan NFC - Mesinkira</title>
  <style>
    :root {
        --primary-blue: #2d59e6;
        --primary-yellow: #ffdb00;
        --grey-primary: #222222;
        --yellow-primary: #fed600;
        --totl-primary-background: rgba(255, 255, 255, .8);
        --totl-primary-font-color: #000;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--totl-primary-background);
      color: var(--totl-primary-font-color);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 400px;
      text-align: center;
    }

    h1 {
      color: var(--primary-blue);
      font-size: 2rem;
    }

    .payment-btn {
      background-color: var(--yellow-primary);
      color: var(--grey-primary);
      padding: 15px;
      font-size: 1.25rem;
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      transition: background-color 0.3s ease;
    }

    .payment-btn:hover {
      background-color: var(--primary-yellow);
    }

    .input-group {
      margin-top: 20px;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .payment-info {
      margin-top: 20px;
      color: var(--grey-primary);
    }

    .nfc-card {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      padding: 10px;
      background-color: var(--primary-blue);
      border-radius: 12px;
      color: white;
      font-size: 1.5rem;
    }
    
  </style>
</head>
<body>

  <div class="container">
    <h1>Bayar Dengan NFC</h1>
    <p>Masukkan jumlah bayaran anda di bawah.</p>

    <!-- Input for amount -->
    <div class="input-group">
      <label for="amount">Jumlah Bayaran (MYR):</label>
      <input type="number" id="amount" placeholder="Masukkan jumlah bayaran" />
    </div>

    <!-- Select bank -->
    <div class="input-group">
      <label for="bank">Pilih Bank:</label>
      <select id="bank">
        <option value="bankA">Maybank</option>
        <option value="bankB">CIMB</option>
        <option value="bankC">Public Bank</option>
        <option value="bankD">RHB</option>
      </select>
    </div>

    <!-- Input for bank account -->
    <div class="input-group">
      <label for="account">Nombor Akaun Bank:</label>
      <input type="text" id="account" placeholder="Masukkan nombor akaun bank" />
    </div>

    <!-- Pay button -->
    <button class="payment-btn" onclick="processPayment()">Pembayaran melalui NFC</button>

    <div class="payment-info">
      <p>Jumlah yang perlu dibayar: <strong>RM 150.00</strong></p>
    </div>

    <div class="nfc-card">
      NFC Pembayaran Berjaya
    </div>
  </div>

  <script>
    // Simulasi pembayaran NFC
    function processPayment() {
      const amount = document.getElementById('amount').value;
      const bank = document.getElementById('bank').value;
      const account = document.getElementById('account').value;

      if (!amount || !account) {
        alert("Sila pastikan semua maklumat telah dimasukkan dengan betul.");
        return;
      }

      // Simulate NFC transaction processing
      alert(`Pembayaran sebanyak RM${amount} berjaya diproses melalui NFC ke akaun ${bank} (${account})`);
      
      // You can integrate with actual NFC payment API here
    }
  </script>
  
</body>
</html>
