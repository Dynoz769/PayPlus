<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayar Dengan QR</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

<h1>Bayar Dengan QR Code</h1>
<button onclick="generateQRCode()">Jana QR Code Pembayaran</button>
<div id="qr-code"></div>

<script>
  function generateQRCode() {
    // Gantikan dengan URL pembayaran yang anda dapat dari backend
    const payUrl = "https://toyyibpay.com/abc123";  // Payment URL dari backend

    QRCode.toCanvas(document.getElementById("qr-code"), payUrl, function (err) {
      if (err) console.error(err);
    });
  }
</script>

</body>
</html>
