services:
  - type: web
    name: payplus-stripe
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        sync: false
      - key: APP_ALLOWED_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: myr
      - key: STRIPE_TERMINAL_LOCATION_ID
        sync: false
      - key: STRIPE_TERMINAL_CAPTURE_METHOD
        value: manual
